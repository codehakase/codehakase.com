<header class="flex flex-col md:flex-row justify-between items-center py-8">
  <div>
    <h1 class="text-base font-bold">
      <a href="{{ .Site.BaseURL }}">codehakase.com</a>
    </h1>
  </div>

  <div style="display:flex;align-items:center;">
    <nav class="site-nav">
      <a href="/about">about</a>
      <span class="sep">/</span>
      <a href="/blog">posts</a>
      <span class="sep">/</span>
      <a href="/projects">projects</a>
      <span class="sep">/</span>
      <a href="/{{ now.Format "2006" }}">links</a>
    </nav>
    <button onclick="toggleTheme()" title="Toggle dark mode" class="theme-toggle-btn">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</header>

<script>
function toggleTheme() {
  var h = document.documentElement;
  var current = h.getAttribute('data-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  var next = current === 'dark' ? 'light' : 'dark';
  h.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
  if (!localStorage.getItem('theme')) {
    document.documentElement.removeAttribute('data-theme');
  }
});
</script>
